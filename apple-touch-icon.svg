    <path d="M -300 -150 A 380 380 0 0 1 300 -150" stroke-width="5"/>
    <path d="M 300 150 A 380 380 0 0 1 -300 150" stroke-width="5"/>
    <path d="M -250 -110 L -100 -50 L 50 -150 L 200 -80" stroke-width="5" fill="none"/>
    <path d="M -250 110 L -100 50 L 50 150 L 200 80" stroke-width="5" fill="none"/>
    <circle cx="-250" cy="-110" r="22" stroke-width="5" fill="#061129"/>
    <circle cx="-100" cy="-50" r="18" fill="#061129"/>
    <circle cx="50" cy="-150" r="22" stroke-width="5" fill="#061129"/>
    <circle cx="200" cy="-80" r="18" fill="#061129"/>
    <circle cx="-250" cy="110" r="18" fill="#061129"/>
    <circle cx="-100" cy="50" r="22" stroke-width="5" fill="#061129"/>
    <circle cx="50" cy="150" r="18" fill="#061129"/>
    <circle cx="200" cy="80" r="22" stroke-width="5" fill="#061129"/>
    <circle cx="0" cy="0" r="26" stroke-width="5" fill="#061129"/>
  </g>

  <!-- EK -->
  <text x="512" y="640" text-anchor="middle"
